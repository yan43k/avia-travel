# Render Blueprint — Avia Travel (API + static frontend)
# БД: внешний PostgreSQL (Neon), т.к. на Render Free только ОДНА free Postgres на аккаунт.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: avia-travel-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run render:build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Создай БД на https://neon.tech → скопируй Connection string сюда в Render Dashboard
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: ACCESS_TTL
        value: 15m
      - key: REFRESH_TTL_DAYS
        value: "14"
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: avia-travel-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: avia-travel-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: API_PUBLIC_URL
        fromService:
          type: web
          name: avia-travel-api
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: avia-travel-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build:render
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: avia-travel-api
          envVarKey: RENDER_EXTERNAL_URL
